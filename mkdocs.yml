site_name: BNG Metric
site_url: https://defra.github.io/bng-metric-harness/
site_description: Aggregated documentation for the BNG Metric harness, frontend, and backend repositories.
repo_url: https://github.com/DEFRA/bng-metric-harness
repo_name: DEFRA/bng-metric-harness
edit_uri: ""

docs_dir: site_src/docs
site_dir: _site

# Navigation is generated by scripts/build-docs.mjs.
INHERIT: mkdocs.generated.yml

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - tables
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.details

# The LikeC4 SPA lives at site_src/docs/architecture/app/. It's plain HTML/JS/CSS
# so MkDocs copies it verbatim — no `exclude_docs` needed (and that setting would
# drop the files from the published site, breaking the iframe).

extra_css:
  - assets/full-bleed.css
