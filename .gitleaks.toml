[extend]
useDefault = true

[allowlist]
description = "Harness allowlist"
paths = [
  '''node_modules/''',
  '''_site/''',
  '''site_src/''',
  '''test-data/''',
  '''package-lock\.json''',
  # LikeC4 architecture diagrams: DSL element names / descriptions, no secrets.
  # Long camelCase element paths trip the generic-api-key entropy rule.
  '''likec4/''',
]
