  run-integration-tests:
    name: Run Integration Tests
    runs-on: ubuntu-latest
    needs: parse-depends-on
    steps:
      - name: Check out bng-metric-harness
        uses: actions/checkout@v4
        with:
          repository: DEFRA/bng-metric-harness
          ref: ${{ needs.parse-depends-on.outputs.harness-branch }}
          path: bng-metric-harness

      - name: Check out bng-metric-frontend
        uses: actions/checkout@v4
        with:
          repository: DEFRA/bng-metric-frontend
          ref: ${{ needs.parse-depends-on.outputs.frontend-branch }}
          path: bng-metric-frontend

      - name: Check out bng-metric-backend
        uses: actions/checkout@v4
        with:
          repository: DEFRA/bng-metric-backend
          ref: ${{ needs.parse-depends-on.outputs.backend-branch }}
          path: bng-metric-backend

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: bng-metric-frontend/.nvmrc
          cache: npm
          cache-dependency-path: |
            bng-metric-harness/package-lock.json
            bng-metric-frontend/package-lock.json
            bng-metric-backend/package-lock.json

      - name: Install harness dependencies
        run: npm ci
        working-directory: bng-metric-harness

      - name: Install frontend dependencies
        run: npm ci
        working-directory: bng-metric-frontend

      - name: Install backend dependencies
        run: npm ci
        working-directory: bng-metric-backend

      - name: Run integration tests
        run: node scripts/test.mjs all
        working-directory: bng-metric-harness
