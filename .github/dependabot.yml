version: 2

updates:
  # Update npm packages
  - package-ecosystem: npm
    directory: /
    open-pull-requests-limit: 10

    # Group low-risk updates into shared PRs
    groups:
      # @types/* packages are usually devDependencies, so they typically fall
      # into this group. (If declared under "dependencies" — e.g. a library that
      # re-exports them — they'd instead land in the npm-minor-patch group.)
      dev-dependencies:
        dependency-type: development
      # Roll all remaining minor/patch bumps into one PR so they merge
      # together — avoids competing lockfile updates across many PRs.
      npm-minor-patch:
        patterns:
          - '*'
        update-types:
          - minor
          - patch

    # Schedule run every day, local time
    schedule:
      interval: daily
      time: '10:30'
      timezone: 'Europe/London'

    versioning-strategy: increase

    # Hold new PRs for a few days after a release so auto-merge does not pull in
    # a version that gets yanked shortly after publishing. Longer hold for the
    # riskier bumps.
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3

    allow:
      # Include direct package.json updates
      - dependency-type: direct

  # Update GitHub Actions
  - package-ecosystem: github-actions
    directory: /

    # Schedule run every day, local time
    schedule:
      interval: daily
      time: '10:30'
      timezone: 'Europe/London'

    # Hold new PRs for a few days after a release (see npm block above).
    # GitHub Actions is not semver-versioned, so only default-days is supported.
    cooldown:
      default-days: 7

  # Update the Docker base image
  - package-ecosystem: docker
    directory: /

    # Schedule run every day, local time
    schedule:
      interval: daily
      time: '10:30'
      timezone: 'Europe/London'

    # Pin the Node base image: we manage Node upgrades manually (kept in step
    # with .nvmrc / package.json engines), so Dependabot must not raise base-image
    # version PRs for it. Remove this entry to re-enable automated Node bumps.
    ignore:
      - dependency-name: 'node'
